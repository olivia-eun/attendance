<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출근 현황 — 보험플라자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',Arial,sans-serif;font-size:13px;background:#F2F5F9;color:#222}
.page{max-width:1100px;margin:0 auto;padding:20px 16px}

/* 헤더 */
.header{background:#1B3A4B;border-radius:12px;padding:16px 24px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:17px;font-weight:600;color:#fff}
.header p{font-size:11px;color:#9BB8C7;margin-top:3px}
.header-right{display:flex;gap:8px}
.hbtn{background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.22);color:#fff;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,0.22)}
.hbtn.primary{background:#fff;color:#1B3A4B;font-weight:600}
.hbtn.primary:hover{background:#EEF3FF}

/* 검색 박스 */
.search-box{background:#fff;border-radius:12px;border:1px solid #E0E6EE;padding:18px 22px;margin-bottom:14px}
.search-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:12px}
.search-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.search-group{display:flex;flex-direction:column;gap:5px}
.search-group label{font-size:11px;color:#666;font-weight:600}
.sinp{border:1px solid #C5CDD6;border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;color:#222;background:#FAFCFF}
.sinp:focus{outline:none;border-color:#378ADD;background:#fff}
select.sinp{min-width:130px;cursor:pointer}
input[type=date].sinp{width:140px;cursor:pointer}
.range-sep{color:#aaa;font-size:13px;padding-bottom:8px}
.search-btn{background:#1B3A4B;color:#fff;border:none;border-radius:7px;padding:8px 22px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap}
.search-btn:hover{background:#2F4858}
.reset-btn{background:#fff;color:#666;border:1px solid #C5CDD6;border-radius:7px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit}
.reset-btn:hover{background:#F4F6F9}

/* 결과 없음 */
.no-result{text-align:center;padding:48px 20px;color:#aaa;font-size:14px}

/* 요약 카드 */
.summary-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.scard{background:#fff;border-radius:10px;border:1px solid #E0E6EE;padding:13px 16px}
.scard .sl{font-size:11px;color:#888;margin-bottom:4px}
.scard .sv{font-size:22px;font-weight:700}
.scard.att .sv{color:#27500A}
.scard.hos .sv{color:#633806}
.scard.abs .sv{color:#791F1F}
.scard.tot .sv{color:#185FA5}

/* 결과 테이블 */
.result-wrap{background:#fff;border-radius:12px;border:1px solid #E0E6EE;overflow:hidden}
.result-header{background:#2F4858;color:#fff;padding:10px 18px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.result-header span{font-size:11px;color:#9BB8C7;font-weight:400}
.tbl-scroll{overflow-x:auto}
table{border-collapse:collapse;width:100%}
th{background:#E8EEF4;font-size:11px;font-weight:600;color:#2F4858;padding:9px 12px;text-align:center;border-right:1px solid #D5DCE4;border-bottom:1.5px solid #C5CDD6;white-space:normal;line-height:1.4}
th:last-child{border-right:none}
td{font-size:12px;padding:8px 12px;border-bottom:1px solid #EEF1F4;border-right:1px solid #EEF1F4;text-align:center;vertical-align:middle}
td:last-child{border-right:none}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#FAFCFF}
tr:hover td{background:#EEF5FF !important}
.sum-row td{background:#E8EEF4 !important;font-weight:700;color:#1B3A4B;font-size:12px}

/* 지점 구분행 */
.branch-row td{background:#F0F4F8 !important;font-weight:700;color:#1B3A4B;font-size:11px;letter-spacing:.3px}

/* 배지 */
.badge{border-radius:5px;padding:3px 9px;font-size:11px;font-weight:600;display:inline-block}
.badge.att{background:#D6EAD6;color:#27500A}
.badge.hos{background:#FFF3CD;color:#633806}
.badge.abs{background:#FADADD;color:#791F1F}
.badge.none{background:#F0F0F0;color:#aaa}

/* 입력 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px 28px;min-width:320px;max-width:460px;width:92%}
.modal h3{font-size:15px;font-weight:600;color:#1B3A4B;margin-bottom:4px}
.modal .msub{font-size:11px;color:#888;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:#666;margin-bottom:5px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;border:1px solid #C5CDD6;border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;color:#222}
.modal textarea{resize:vertical;min-height:72px}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:#378ADD}
.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0}
.st-btn{border:1px solid #D5DCE4;background:#fff;border-radius:7px;padding:8px 4px;cursor:pointer;font-size:12px;font-family:inherit;text-align:center}
.st-btn:hover{background:#EEF3FF}
.st-btn.s-none{background:#F0F0F0;border-color:#999;color:#555;font-weight:600}
.st-btn.s-att{background:#D6EAD6;border-color:#3B6D11;color:#27500A;font-weight:600}
.st-btn.s-hos{background:#FFF3CD;border-color:#854F0B;color:#633806;font-weight:600}
.st-btn.s-abs{background:#FADADD;border-color:#A32D2D;color:#791F1F;font-weight:600}
.modal-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.mbtn{border:1px solid #C5CDD6;background:#fff;border-radius:7px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit}
.mbtn:hover{background:#EEF3FF}
.mbtn.primary{background:#1B3A4B;color:#fff;border-color:#1B3A4B}
.mbtn.primary:hover{background:#2F4858}


/* 검색 모드 탭 */
.mode-tabs{display:flex;border:1px solid #C5CDD6;border-radius:7px;overflow:hidden}
.mode-tab{background:#fff;border:none;padding:7px 18px;font-size:12px;font-family:inherit;color:#666;cursor:pointer;font-weight:500;transition:all .12s}
.mode-tab+.mode-tab{border-left:1px solid #C5CDD6}
.mode-tab.active{background:#1B3A4B;color:#fff;font-weight:600}
.mode-tab:hover:not(.active){background:#EEF3FF}
@media print{
  body{background:#fff}.page{padding:6px}
  .header{background:#1B3A4B!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .search-box,.hbtn,.header-right{display:none!important}
  .badge.att{background:#D6EAD6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .badge.hos{background:#FFF3CD!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .badge.abs{background:#FADADD!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* 직원 관리 패널 */
.mgmt-box{background:#fff;border-radius:12px;border:1px solid #E0E6EE;margin-bottom:14px;overflow:hidden}
.mgmt-header{background:#2F4858;color:#fff;padding:10px 18px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.mgmt-header .toggle-icon{font-size:13px;transition:transform .2s}
.mgmt-header.open .toggle-icon{transform:rotate(180deg)}
.mgmt-body{display:none;padding:16px 18px}
.mgmt-body.open{display:block}
.mgmt-top{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;padding-bottom:14px;border-bottom:1px dashed #E0E6EE}
.mgmt-inp{border:1px solid #C5CDD6;border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;color:#222;background:#FAFCFF}
.mgmt-inp:focus{outline:none;border-color:#378ADD;background:#fff}
.mgmt-add-btn{background:#1A5E1A;color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap}
.mgmt-add-btn:hover{background:#27500A}
/* 지점별 직원 목록 */
.mgmt-branches{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.mgmt-branch-block{border:1px solid #E0E6EE;border-radius:9px;overflow:hidden}
.mgmt-branch-title{background:#E8EEF4;padding:8px 12px;font-size:11px;font-weight:700;color:#1B3A4B;display:flex;align-items:center;justify-content:space-between}
.mgmt-branch-title .branch-del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:0 2px}
.mgmt-branch-title .branch-del-btn:hover{color:#A32D2D}
.mgmt-member-row{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-top:1px solid #F0F0F0;font-size:12px;color:#333}
.mgmt-member-row:hover{background:#FAFCFF}
.mem-del-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:12px;padding:0 3px;border-radius:3px}
.mem-del-btn:hover{color:#A32D2D;background:#FFF0F0}
.mgmt-group{display:flex;flex-direction:column;gap:4px}
.mgmt-group label{font-size:11px;color:#666;font-weight:600}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <h1>출근 현황</h1>
      <p>보험플라자 · 메가 주식회사</p>
    </div>
    <div class="header-right">
      <button class="hbtn primary" onclick="saveFile()">💾 저장</button>
      <label class="hbtn" style="cursor:pointer;margin:0" for="load-file-inp">📂 불러오기</label>
      <input type="file" id="load-file-inp" accept=".json" style="display:none" onchange="loadFile(event)">
      <button class="hbtn" onclick="exportCSV()">⬇ CSV</button>
      <button class="hbtn" onclick="window.print()">🖨 인쇄</button>
    </div>
  </div>

  <!-- 직원 관리 패널 -->
  <div class="mgmt-box">
    <div class="mgmt-header" id="mgmt-header" onclick="toggleMgmt()">
      👥 지점 · 직원 관리 <span class="toggle-icon" id="mgmt-icon">▼</span>
    </div>
    <div class="mgmt-body" id="mgmt-body">
      <!-- 추가 폼 -->
      <div class="mgmt-top">
        <div class="mgmt-group">
          <label>지점명</label>
          <input id="new-branch" class="mgmt-inp" placeholder="지점명 입력 또는 선택" list="branch-list" style="width:160px">
          <datalist id="branch-list"></datalist>
        </div>
        <div class="mgmt-group">
          <label>이름</label>
          <input id="new-name" class="mgmt-inp" placeholder="이름" style="width:120px" onkeydown="if(event.key==='Enter')addMember()">
        </div>
        <button class="mgmt-add-btn" onclick="addMember()">＋ 직원 추가</button>
        <button class="mgmt-add-btn" onclick="addBranchOnly()" style="background:#185FA5">＋ 지점만 추가</button>
      </div>
      <!-- 지점별 목록 -->
      <div class="mgmt-branches" id="mgmt-branches"></div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="search-box">
    <div class="search-title">검색 조건</div>
    <div class="search-row">
      <div class="search-group">
        <label>지점</label>
        <select class="sinp" id="sel-branch">
          <option value="">전체</option>
        </select>
      </div>
      <!-- 검색 탭 버튼 -->
      <div class="search-group">
        <label>&nbsp;</label>
        <div class="mode-tabs">
          <button class="mode-tab active" id="tab-today" onclick="setMode('today')">오늘</button>
          <button class="mode-tab" id="tab-range" onclick="setMode('range')">기간</button>
        </div>
      </div>
      <!-- 오늘 모드 -->
      <div id="mode-today" class="search-group">
        <label>날짜</label>
        <input type="date" class="sinp" id="date-today" style="width:145px">
      </div>
      <!-- 기간 모드 -->
      <div id="mode-range" class="search-group" style="display:none;flex-direction:row;align-items:flex-end;gap:6px">
        <div class="search-group">
          <label>기간 시작</label>
          <input type="date" class="sinp" id="date-from" style="width:145px">
        </div>
        <div class="range-sep">~</div>
        <div class="search-group">
          <label>기간 종료</label>
          <input type="date" class="sinp" id="date-to" style="width:145px">
        </div>
      </div>
      <button class="search-btn" onclick="doSearch()">검색</button>
      <button class="reset-btn" onclick="resetSearch()">초기화</button>
    </div>
  </div>

  <!-- 결과 영역 -->
  <div id="result-area" style="display:none">
    <div class="summary-cards">
      <div class="scard att"><div class="sl">출근</div><div class="sv" id="sum-att">0</div></div>
      <div class="scard hos"><div class="sl">병원근무</div><div class="sv" id="sum-hos">0</div></div>
      <div class="scard abs"><div class="sl">결근</div><div class="sv" id="sum-abs">0</div></div>
      <div class="scard tot"><div class="sl">미입력</div><div class="sv" id="sum-none">0</div></div>
    </div>
    <div class="result-wrap">
      <div class="result-header">
        <span id="result-title">검색 결과</span>
        <span id="result-sub"></span>
      </div>
      <div class="tbl-scroll">
        <table id="result-table"></table>
      </div>
    </div>
  </div>
  <div id="no-result" class="no-result" style="display:none">검색 결과가 없습니다.</div>

</div>

<!-- 상태 입력 모달 -->
<div class="modal-bg" id="entry-modal">
  <div class="modal">
    <h3 id="modal-title">출근 상태 입력</h3>
    <div class="msub" id="modal-sub"></div>
    <div style="font-size:12px;font-weight:600;color:#444;margin-bottom:6px">상태 선택</div>
    <div class="status-grid">
      <button class="st-btn" id="mst-none" onclick="pickSt(null)">— 없음</button>
      <button class="st-btn" id="mst-att"  onclick="pickSt('att')">출근</button>
      <button class="st-btn" id="mst-hos"  onclick="pickSt('hos')">병원근무</button>
      <button class="st-btn" id="mst-abs"  onclick="pickSt('abs')">결근</button>
    </div>
    <label>사유 / 메모 <span style="color:#bbb;font-weight:400">(선택)</span></label>
    <textarea id="modal-note" placeholder="연차, 병가, 조퇴, 외근 등"></textarea>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">취소</button>
      <button class="mbtn primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script>
// ── 직원 데이터 ──
const STAFF_DEFAULT = [
  {branch:"다온플러스",  name:"이진희"},
  {branch:"다온1팀",    name:"이지연"},
  {branch:"다온1팀",    name:"장현호"},
  {branch:"다온1팀",    name:"유해선"},
  {branch:"다온1팀",    name:"김윤정"},
  {branch:"다온1팀",    name:"유경완"},
  {branch:"다온1팀",    name:"김수지"},
  {branch:"다온1팀",    name:"양승훈"},
  {branch:"다온1팀",    name:"김은영"},
  {branch:"다온1팀",    name:"이진철"},
  {branch:"다온2팀",    name:"국현아"},
  {branch:"다온2팀",    name:"진대환"},
  {branch:"다온2팀",    name:"김보민"},
  {branch:"다온2팀",    name:"이지인"},
  {branch:"다온2팀",    name:"김정효"},
  {branch:"다온2팀",    name:"김가령"},
  {branch:"하이지점",   name:"김보람"},
  {branch:"하이지점",   name:"고명희"},
  {branch:"하이지점",   name:"한유진"},
  {branch:"하이지점",   name:"전은미"},
  {branch:"하이지점",   name:"김현진"},
  {branch:"하이지점",   name:"송지혜"},
  {branch:"하이지점",   name:"김은실"},
  {branch:"하이지점",   name:"전가회"},
  {branch:"하이지점",   name:"최재일"},
  {branch:"온고을1팀",  name:"윤옥임"},
  {branch:"온고을1팀",  name:"이동엽"},
  {branch:"온고을1팀",  name:"심지원"},
  {branch:"온고을1팀",  name:"배세열"},
  {branch:"온고을1팀",  name:"장빈"},
  {branch:"온고을1팀",  name:"송경옥"},
  {branch:"온고을1팀",  name:"박봉순"},
  {branch:"온고을2팀",  name:"장하현"},
  {branch:"온고을2팀",  name:"홍준"},
  {branch:"온고을2팀",  name:"문인"},
  {branch:"온고을직할팀",name:"송지화"},
];

const BRANCH_ORDER=["다온플러스","다온1팀","다온2팀","하이지점","온고을1팀","온고을2팀","온고을직할팀"];
const HOLIDAYS=new Set(["2025-01-01","2025-03-01","2025-05-05","2025-06-06","2025-08-15","2025-09-05","2025-09-06","2025-09-07","2025-10-03","2025-10-09","2025-12-25","2026-01-01","2026-03-01","2026-05-05","2026-05-06","2026-06-06","2026-08-15","2026-09-24","2026-09-25","2026-09-26","2026-10-03","2026-10-09","2026-12-25"]);
const WD=["일","월","화","수","목","금","토"];
const SLBL={att:"출근",hos:"병원근무",abs:"결근"};

let staff=[...STAFF_DEFAULT.map(s=>({...s}))];
let data={};

// ── 유틸 ──
function pad(n){return String(n).padStart(2,"0")}
function todayStr(){const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`}
function gk(si,key){return `${si}_${key}`}
function getEntry(si,key){return data[gk(si,key)]||{st:null,note:""}}
function getSt(si,key){return getEntry(si,key).st}

function getBizKeys(from,to){
  const keys=[],cur=new Date(from),end=new Date(to);
  while(cur<=end){
    const y=cur.getFullYear(),m=cur.getMonth()+1,d=cur.getDate();
    const k=`${y}-${pad(m)}-${pad(d)}`;
    if(cur.getDay()!==0&&cur.getDay()!==6&&!HOLIDAYS.has(k)) keys.push(k);
    cur.setDate(cur.getDate()+1);
  }
  return keys;
}

function esc(s){return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ── 저장/불러오기 ──
// localStorage: 같은 PC 자동저장
function save(){
  try{
    localStorage.setItem("bp_staff",JSON.stringify(staff));
    localStorage.setItem("bp_data",JSON.stringify(data));
  }catch(e){}
}
function load(){
  try{
    const s=localStorage.getItem("bp_staff"),d=localStorage.getItem("bp_data");
    if(s) staff=JSON.parse(s);
    if(d) data=JSON.parse(d);
  }catch(e){}
}

// 파일로 저장 (JSON 다운로드) → 다른 PC에서 불러오기 가능
function saveFile(){
  const payload={staff, data, savedAt: new Date().toISOString()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  const today=todayStr();
  a.href=URL.createObjectURL(blob);
  a.download=`출근현황_보험플라자_${today}.json`;
  a.click();
  // 저장 완료 알림
  const btn=document.querySelector(".hbtn.primary");
  const orig=btn.textContent;
  btn.textContent="✅ 저장됨";
  setTimeout(()=>btn.textContent=orig,1500);
}

// 파일 불러오기 (JSON → 데이터 복원)
function loadFile(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const payload=JSON.parse(ev.target.result);
      if(!payload.staff||!payload.data){
        alert("올바른 출근현황 파일이 아닙니다."); return;
      }
      staff=payload.staff;
      data=payload.data;
      save(); // localStorage에도 동기화
      initBranchSelect();
      renderMgmt();
      // 결과 영역 초기화
      document.getElementById("result-area").style.display="none";
      document.getElementById("no-result").style.display="none";
      const saved=payload.savedAt?new Date(payload.savedAt).toLocaleString("ko-KR"):"";
      alert(`불러오기 완료!\n직원 ${staff.length}명\n${saved?`저장 시각: ${saved}`:""}`);
    }catch(err){
      alert("파일을 읽는 중 오류가 발생했습니다.\n"+err.message);
    }
    e.target.value=""; // 같은 파일 재선택 허용
  };
  reader.readAsText(file,"utf-8");
}

// ── 지점 셀렉트 초기화 ──
function initBranchSelect(){
  const sel=document.getElementById("sel-branch");
  const branches=[...new Set(staff.map(s=>s.branch))].sort((a,b)=>{
    const ai=BRANCH_ORDER.indexOf(a),bi=BRANCH_ORDER.indexOf(b);
    if(ai>-1&&bi>-1)return ai-bi;
    if(ai>-1)return -1;if(bi>-1)return 1;
    return a.localeCompare(b);
  });
  sel.innerHTML=`<option value="">전체</option>`;
  branches.forEach(b=>sel.innerHTML+=`<option value="${esc(b)}">${b}</option>`);
}

// ── 검색 모드 전환 ──
let searchMode = "today";

function setMode(mode){
  searchMode = mode;
  document.getElementById("tab-today").classList.toggle("active", mode==="today");
  document.getElementById("tab-range").classList.toggle("active", mode==="range");
  document.getElementById("mode-today").style.display = mode==="today" ? "" : "none";
  document.getElementById("mode-range").style.display = mode==="range" ? "flex" : "none";
}

// ── 검색 실행 ──
function doSearch(){
  const branch = document.getElementById("sel-branch").value;
  let from, to;

  if(searchMode === "today"){
    const d = document.getElementById("date-today").value;
    if(!d){ alert("날짜를 선택해 주세요."); return; }
    from = to = d;
  } else {
    from = document.getElementById("date-from").value;
    to   = document.getElementById("date-to").value;
    if(!from||!to){ alert("기간 시작과 종료를 모두 입력해 주세요."); return; }
    if(from > to){ alert("시작일이 종료일보다 늦습니다."); return; }
  }

  const isRange = (searchMode === "range");
  const bizKeys = getBizKeys(from, to);
  // 오늘 검색이고 해당일이 영업일 아니어도 날짜 자체는 보여줌
  const displayKeys = isRange ? bizKeys : [from];

  const targets = staff.map((s,si)=>({...s,si})).filter(s=>!branch||s.branch===branch);

  if(targets.length === 0){
    document.getElementById("result-area").style.display = "none";
    document.getElementById("no-result").style.display = "block";
    return;
  }

  // ── 요약 집계 ──
  let totA=0, totH=0, totB=0, totNone=0;
  targets.forEach(({si})=>{
    displayKeys.forEach(k=>{
      const st = getSt(si,k);
      if(st==="att") totA++; else if(st==="hos") totH++; else if(st==="abs") totB++; else totNone++;
    });
  });
  document.getElementById("sum-att").textContent  = totA;
  document.getElementById("sum-hos").textContent  = totH;
  document.getElementById("sum-abs").textContent  = totB;
  document.getElementById("sum-none").textContent = totNone;

  // ── 제목 ──
  const [fy,fm,fd] = from.split("-");
  const branchLbl  = branch ? `[${branch}] ` : "전체 ";
  let dateLbl;
  if(isRange){
    const [ty,tm,td] = to.split("-");
    dateLbl = `${fy}.${fm}.${fd} ~ ${ty}.${tm}.${td} (영업일 ${bizKeys.length}일)`;
  } else {
    dateLbl = `${fy}.${fm}.${fd} (${WD[new Date(from).getDay()]})`;
  }
  document.getElementById("result-title").textContent = branchLbl + dateLbl;
  document.getElementById("result-sub").textContent   = `대상 ${targets.length}명`;

  // ── 지점별 그룹 ──
  const grouped = {};
  targets.forEach(t=>{ if(!grouped[t.branch]) grouped[t.branch]=[]; grouped[t.branch].push(t); });
  const sortedBranches = BRANCH_ORDER.filter(b=>grouped[b])
    .concat(Object.keys(grouped).filter(b=>!BRANCH_ORDER.includes(b)).sort());

  let h = "", no = 1;

  if(!isRange){
    // ════════════════════════════════
    // 오늘 검색: 지점별 구분 + 이름·상태·사유
    // ════════════════════════════════
    const key = from;
    h += `<thead><tr>
      <th>No</th><th>지점</th><th>이름</th>
      <th>상태</th><th style="text-align:left;min-width:180px">사유 / 메모</th>
    </tr></thead><tbody>`;

    sortedBranches.forEach(br=>{
      // 지점 구분행
      h += `<tr class="branch-row">
        <td colspan="5" style="text-align:left;padding:7px 14px">📍 ${esc(br)}</td>
      </tr>`;
      grouped[br].forEach(({si,name})=>{
        const e  = getEntry(si, key);
        const st = e.st;
        const badge = st
          ? `<span class="badge ${st}" style="cursor:pointer" onclick="openModal(${si},'${key}')">${SLBL[st]}</span>`
          : `<span class="badge none" style="cursor:pointer" onclick="openModal(${si},'${key}')">미입력</span>`;
        const noteStyle = st==="abs"
          ? "color:#A32D2D;font-weight:500"
          : "color:#555";
        h += `<tr>
          <td style="color:#aaa;font-size:10px">${no++}</td>
          <td style="font-size:11px;color:#777">${esc(br)}</td>
          <td style="font-weight:600;cursor:pointer" onclick="openModal(${si},'${key}')">${esc(name)}</td>
          <td style="cursor:pointer" onclick="openModal(${si},'${key}')">${badge}</td>
          <td style="text-align:left;font-size:12px;${noteStyle};cursor:pointer" onclick="openModal(${si},'${key}')">${esc(e.note||"")}</td>
        </tr>`;
      });
    });

    // 합계행
    h += `<tr class="sum-row">
      <td colspan="3" style="text-align:right">합계</td>
      <td colspan="2" style="text-align:left">
        출근 <strong>${totA}</strong>명 &nbsp;·&nbsp;
        병원근무 <strong>${totH}</strong>명 &nbsp;·&nbsp;
        결근 <strong>${totB}</strong>명 &nbsp;·&nbsp;
        미입력 <strong>${totNone}</strong>명
      </td>
    </tr>`;

  } else {
    // ════════════════════════════════
    // 기간 검색: 날짜별 출근·병원·결근 현황
    // ════════════════════════════════
    // 헤더: No·지점·이름 + 날짜별 + 합계(출근·병원·결근·근무일)
    h += `<thead><tr>
      <th>No</th><th>지점</th><th>이름</th>`;
    bizKeys.forEach(k=>{
      const dt = new Date(k);
      h += `<th>${parseInt(k.split("-")[2])}<br><span style="font-size:9px;font-weight:400">${WD[dt.getDay()]}</span></th>`;
    });
    h += `<th style="width:52px;min-width:52px">출근</th><th style="width:52px;min-width:52px">병원<br>근무</th><th style="width:52px;min-width:52px">결근</th><th style="width:52px;min-width:52px">근무일</th>`;
    h += `</tr></thead><tbody>`;

    sortedBranches.forEach(br=>{
      h += `<tr class="branch-row">
        <td colspan="${7+bizKeys.length}" style="text-align:left;padding:7px 14px">📍 ${esc(br)}</td>
      </tr>`;
      grouped[br].forEach(({si,name})=>{
        let a=0, hs=0, b2=0;
        bizKeys.forEach(k=>{
          const st=getSt(si,k);
          if(st==="att") a++; else if(st==="hos") hs++; else if(st==="abs") b2++;
        });
        h += `<tr>
          <td style="color:#aaa;font-size:10px">${no++}</td>
          <td style="font-size:11px;color:#777">${esc(br)}</td>
          <td style="font-weight:600">${esc(name)}</td>`;
        bizKeys.forEach(k=>{
          const st  = getSt(si,k);
          const e   = getEntry(si,k);
          const hn  = e.note && e.note.trim();
          let cell;
          if(st) cell = `<span class="badge ${st}" title="${hn?esc(e.note):''}" style="cursor:pointer" onclick="openModal(${si},'${k}')">${SLBL[st]}</span>`;
          else   cell = `<span style="color:#ddd;font-size:11px;cursor:pointer" onclick="openModal(${si},'${k}')">—</span>`;
          h += `<td>${cell}</td>`;
        });
        h += `<td><span class="badge att">${a}</span></td>
          <td><span class="badge hos">${hs}</span></td>
          <td><span class="badge abs">${b2}</span></td>
          <td style="font-weight:700;color:#185FA5">${a+hs}</td>
        </tr>`;
      });
    });

    // 합계행 - 날짜별 출근 인원수 + 전체 합계
    h += `<tr class="sum-row">
      <td colspan="3" style="text-align:right">합계</td>`;
    bizKeys.forEach(k=>{
      const cnt = targets.filter(({si})=>getSt(si,k)==="att").length;
      h += `<td style="color:#27500A;font-weight:600">${cnt||"—"}</td>`;
    });
    h += `<td>${totA}</td><td>${totH}</td><td>${totB}</td><td>${totA+totH}</td>`;
    h += `</tr>`;
  }

  h += `</tbody>`;
  document.getElementById("result-table").innerHTML = h;
  document.getElementById("no-result").style.display  = "none";
  document.getElementById("result-area").style.display = "block";
}

function resetSearch(){
  document.getElementById("sel-branch").value = "";
  document.getElementById("date-today").value = todayStr();
  document.getElementById("date-from").value  = "";
  document.getElementById("date-to").value    = "";
  document.getElementById("result-area").style.display = "none";
  document.getElementById("no-result").style.display   = "none";
}

// ── 모달 ──
let _msi=null,_mkey=null,_mst=null;

function openModal(si,key){
  _msi=si; _mkey=key; 
  const e=getEntry(si,key);
  _mst=e.st;
  const s=staff[si];
  const dt=new Date(key);
  document.getElementById("modal-title").textContent=`${s.name} — ${key.replaceAll("-",".")} (${WD[dt.getDay()]})`;
  document.getElementById("modal-sub").textContent=s.branch;
  document.getElementById("modal-note").value=e.note||"";
  updateModalBtns();
  document.getElementById("entry-modal").classList.add("open");
  setTimeout(()=>document.getElementById("modal-note").focus(),120);
}

function pickSt(st){_mst=st;updateModalBtns();}

function updateModalBtns(){
  ["mst-none","mst-att","mst-hos","mst-abs"].forEach(id=>document.getElementById(id).className="st-btn");
  const map={null:"mst-none s-none",att:"mst-att s-att",hos:"mst-hos s-hos",abs:"mst-abs s-abs"};
  const [id,cls]=(map[_mst]||"mst-none s-none").split(" ");
  document.getElementById(id).className=`st-btn ${cls}`;
}

function saveModal(){
  const note=document.getElementById("modal-note").value.trim();
  const k=gk(_msi,_mkey);
  if(!_mst&&!note){delete data[k];}
  else{data[k]={st:_mst,note};}
  save();
  closeModal();
  doSearch(); // 결과 즉시 갱신
}

function closeModal(){document.getElementById("entry-modal").classList.remove("open");}

// ── CSV 내보내기 ──
function exportCSV(){
  let from,to;
  if(searchMode==="today"){
    from=to=document.getElementById("date-today").value;
    if(!from){alert("먼저 검색을 실행해 주세요.");return;}
  } else {
    from=document.getElementById("date-from").value;
    to=document.getElementById("date-to").value;
    if(!from||!to){alert("먼저 검색을 실행해 주세요.");return;}
  }
  const bizKeys=getBizKeys(from,to);
  const branch=document.getElementById("sel-branch").value;
  const targets=staff.map((s,si)=>({...s,si})).filter(s=>!branch||s.branch===branch);
  let csv="\uFEFF지점,이름,"+bizKeys.map(k=>`${parseInt(k.split("-")[2])}일(${WD[new Date(k).getDay()]})`).join(",")+",출근,병원,결근,근무일합계\n";
  targets.forEach(({si,branch:b,name})=>{
    let a=0,hs=0,b2=0;
    const row=[b,name];
    bizKeys.forEach(k=>{const st=getSt(si,k);row.push(st?SLBL[st]:"");if(st==="att")a++;else if(st==="hos")hs++;else if(st==="abs")b2++;});
    row.push(a,hs,b2,a+hs);
    csv+=row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")+"\n";
  });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=`출근현황_${from}_${to}.csv`;a.click();
}

// 모달 배경 닫기
document.getElementById("entry-modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById("modal-note").addEventListener("keydown",e=>{if(e.key==="Enter"&&e.ctrlKey)saveModal();});

// ── 직원 관리 ──
function toggleMgmt(){
  const body=document.getElementById("mgmt-body");
  const header=document.getElementById("mgmt-header");
  const icon=document.getElementById("mgmt-icon");
  const isOpen=body.classList.contains("open");
  body.classList.toggle("open",!isOpen);
  header.classList.toggle("open",!isOpen);
  if(!isOpen) renderMgmt();
}

function renderMgmt(){
  // datalist 업데이트
  const dl=document.getElementById("branch-list");
  const branches=getSortedBranches();
  dl.innerHTML=branches.map(b=>`<option value="${esc(b)}">`).join("");

  // 지점별 블록
  const grouped={};
  staff.forEach((s,si)=>{
    const b=s.branch||"(지점없음)";
    if(!grouped[b])grouped[b]=[];
    grouped[b].push({si,name:s.name});
  });

  const sortedB=BRANCH_ORDER.filter(b=>grouped[b])
    .concat(Object.keys(grouped).filter(b=>!BRANCH_ORDER.includes(b)).sort());

  let h="";
  sortedB.forEach(branch=>{
    h+=`<div class="mgmt-branch-block">`;
    h+=`<div class="mgmt-branch-title">`;
    h+=`📍 ${esc(branch)} <span style="color:#aaa;font-weight:400">(${grouped[branch].length}명)</span>`;
    h+=`<button class="branch-del-btn" title="지점 전체 삭제" onclick="deleteBranch('${esc(branch)}')">🗑</button>`;
    h+=`</div>`;
    grouped[branch].forEach(({si,name})=>{
      h+=`<div class="mgmt-member-row">`;
      h+=`<span>${esc(name)||"(이름없음)"}</span>`;
      h+=`<button class="mem-del-btn" title="삭제" onclick="deleteMember(${si})">✕</button>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  });

  document.getElementById("mgmt-branches").innerHTML=h||`<div style="color:#aaa;font-size:12px;padding:8px">등록된 직원이 없습니다.</div>`;
}

function getSortedBranches(){
  const all=[...new Set(staff.map(s=>s.branch||""))].filter(Boolean);
  return BRANCH_ORDER.filter(b=>all.includes(b)).concat(all.filter(b=>!BRANCH_ORDER.includes(b)).sort());
}

function addMember(){
  const branch=document.getElementById("new-branch").value.trim();
  const name=document.getElementById("new-name").value.trim();
  if(!branch){alert("지점명을 입력해 주세요.");return;}
  if(!name){alert("이름을 입력해 주세요.");return;}
  staff.push({branch,name});
  document.getElementById("new-name").value="";
  save();
  initBranchSelect();
  renderMgmt();
  if(document.getElementById("result-area").style.display!=="none") doSearch();
}

function addBranchOnly(){
  const branch=document.getElementById("new-branch").value.trim();
  if(!branch){alert("지점명을 입력해 주세요.");return;}
  if(staff.some(s=>s.branch===branch)){alert("이미 존재하는 지점입니다.");return;}
  // 빈 멤버로 지점 생성
  staff.push({branch,name:""});
  document.getElementById("new-branch").value="";
  save();
  initBranchSelect();
  renderMgmt();
}

function deleteMember(si){
  const s=staff[si];
  if(!confirm(`'${s.name||"(이름없음)"}' (${s.branch})을 삭제할까요?
해당 직원의 출근 데이터도 함께 삭제됩니다.`)) return;
  // 해당 직원 데이터 삭제
  Object.keys(data).filter(k=>k.startsWith(si+"_")).forEach(k=>delete data[k]);
  // 뒤 인덱스 재정렬
  for(let i=si;i<staff.length-1;i++){
    Object.keys(data).filter(k=>k.startsWith((i+1)+"_")).forEach(k=>{
      data[k.replace((i+1)+"_",i+"_")]=data[k]; delete data[k];
    });
  }
  staff.splice(si,1);
  save();
  initBranchSelect();
  renderMgmt();
  if(document.getElementById("result-area").style.display!=="none") doSearch();
}

function deleteBranch(branch){
  const members=staff.filter(s=>s.branch===branch);
  if(!confirm(`'${branch}' 지점 전체(${members.length}명)를 삭제할까요?
출근 데이터도 함께 삭제됩니다.`)) return;
  // 해당 지점 인덱스 수집 (역순 삭제)
  const indices=staff.map((s,i)=>s.branch===branch?i:-1).filter(i=>i>=0).reverse();
  indices.forEach(si=>{
    Object.keys(data).filter(k=>k.startsWith(si+"_")).forEach(k=>delete data[k]);
    for(let i=si;i<staff.length-1;i++){
      Object.keys(data).filter(k=>k.startsWith((i+1)+"_")).forEach(k=>{
        data[k.replace((i+1)+"_",i+"_")]=data[k]; delete data[k];
      });
    }
    staff.splice(si,1);
  });
  save();
  initBranchSelect();
  renderMgmt();
  if(document.getElementById("result-area").style.display!=="none") doSearch();
}

load();
initBranchSelect();

// 오늘 날짜 기본 세팅
const td=todayStr();
document.getElementById("date-today").value=td;
setMode("today");
</script>
